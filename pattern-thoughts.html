<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Thoughts | MetaVoxa Palace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #05070a;
            --paper-cream: #F4EFE6;
            --paper-shadow: #D9D0C3;
            --board-taupe: #2C2521;
            --gold-brass: linear-gradient(180deg, #D4B896 0%, #C2A45F 40%, #8A6B2A 100%);
            --burgundy: #521b1b;
            --text-deep: #2A2A2A;
            --gold-mid: #C2A45F;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: var(--bg-deep);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Atmospheric Vignette */
        .vignette-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 40%, transparent 0%, rgba(0,0,0,0.85) 100%);
            pointer-events: none;
            z-index: 1000;
        }

        /* --- RESTORED GLOBAL NAV --- */
        .exit-door {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 1100;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0.6;
            transition: 0.4s;
        }
        .exit-door:hover { opacity: 1; }
        .door-icon {
            width: 24px;
            height: 38px;
            border: 1px solid var(--gold-mid);
            border-radius: 12px 12px 2px 2px;
            position: relative;
        }
        .exit-text { font-family: 'Cinzel'; font-size: 0.65rem; color: var(--gold-mid); letter-spacing: 0.1em; text-transform: uppercase; }

        .today-marker {
            position: fixed;
            top: 30px;
            right: 30px;
            background: var(--gold-mid);
            color: black;
            padding: 8px 18px;
            border-radius: 20px;
            font-family: 'Cinzel';
            font-size: 0.55rem;
            z-index: 1100;
            cursor: pointer;
        }

        /* --- CALENDAR STRUCTURE --- */
        .pattern-container {
            max-width: 700px;
            margin: 120px auto 140px;
            position: relative;
            z-index: 50;
        }

        .calendar-base {
            background: var(--board-taupe);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 60px 120px rgba(0,0,0,0.9);
            position: relative;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* The 6 Brass Rings */
        .spiral-binding {
            position: absolute;
            top: -30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            padding: 0 50px;
            z-index: 100;
        }
        .brass-ring {
            width: 12px;
            height: 65px;
            background: var(--gold-brass);
            border-radius: 10px;
            box-shadow: 4px 6px 12px rgba(0,0,0,0.6), inset -1px 0 2px rgba(255,255,255,0.2);
        }

        /* The Paper Page */
        .calendar-page {
            background: var(--paper-cream);
            min-height: 520px;
            position: relative;
            overflow: hidden;
            border-radius: 2px 2px 6px 6px;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.05);
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' opacity='0.2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            color: var(--text-deep);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Realistic Header Strip */
        .page-header-strip {
            background: var(--burgundy);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #d4b896;
            font-family: 'Cinzel';
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .header-num { font-size: 1.5rem; letter-spacing: 2px; }
        .header-meta { text-align: right; font-size: 0.6rem; text-transform: uppercase; opacity: 0.9; }
        .header-meta b { display: block; font-size: 0.8rem; margin-top: 2px; }

        .pattern-content { padding: 60px 50px; text-align: center; }
        .pattern-title { font-family: 'Playfair Display'; font-size: 1.7rem; margin-bottom: 40px; line-height: 1.4; font-weight: 400; }
        .pattern-body { font-family: 'Cormorant Garamond'; font-size: 1.15rem; line-height: 1.8; opacity: 0.8; margin-bottom: 40px; }

        /* Deeper Layer */
        .deeper-layer { border-top: 1px solid rgba(0,0,0,0.08); padding-top: 25px; cursor: help; }
        .deeper-label { font-family: 'Cinzel'; font-size: 0.5rem; text-transform: uppercase; letter-spacing: 0.3em; color: var(--burgundy); opacity: 0.6; display: block; margin-bottom: 10px; }
        .deeper-text { font-style: italic; font-size: 0.95rem; color: var(--burgundy); }

        /* Substack Button Restored */
        .substack-connection { margin-top: 30px; opacity: 0; transform: translateY(10px); transition: 0.6s; }
        .substack-connection.visible { opacity: 1; transform: translateY(0); }
        .substack-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 24px;
            border: 1px solid var(--gold-mid);
            color: var(--text-deep);
            text-decoration: none;
            font-family: 'Cinzel';
            font-size: 0.6rem;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .substack-link:hover { background: var(--gold-mid); color: black; }

        /* Corner Curl */
        .page-curl { position: absolute; bottom: 0; right: 0; width: 100px; height: 100px; }
        .curl-fold {
            position: absolute; bottom: 0; right: 0; width: 80px; height: 80px;
            background: linear-gradient(135deg, #f4efe6 0%, #d9d0c3 100%);
            clip-path: path("M 80 80 L 80 0 Q 60 10 40 25 Q 10 45 0 80 Z");
            z-index: 2;
        }
        .curl-shadow {
            position: absolute; bottom: 10px; right: 10px; width: 70px; height: 40px;
            background: rgba(0,0,0,0.2); filter: blur(10px); transform: rotate(-10deg);
        }

        /* --- RESTORED NAVIGATION/ARCHIVE/KEY --- */
        .pattern-nav { display: flex; justify-content: center; gap: 30px; margin-top: 40px; }
        .nav-btn { background: none; border: 1px solid rgba(212,184,150,0.3); color: var(--gold-mid); width: 50px; height: 50px; border-radius: 50%; cursor: pointer; transition: 0.3s; }
        .nav-btn:hover { border-color: var(--gold-mid); background: rgba(212,184,150,0.1); }

        .archive-section { margin-top: 80px; border-top: 1px solid rgba(212,184,150,0.1); padding-top: 40px; }
        .year-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .year-item { border: 1px solid rgba(212,184,150,0.1); padding: 15px; text-align: center; cursor: pointer; transition: 0.3s; }
        .year-item.active { border-color: var(--gold-mid); background: rgba(212,184,150,0.05); }
        .year-item b { font-family: 'Cinzel'; color: var(--gold-mid); display: block; }
        .year-item span { font-style: italic; font-size: 0.7rem; color: #aaa; }

        .the-key { position: fixed; bottom: 30px; right: 30px; z-index: 1100; cursor: pointer; opacity: 0.6; transition: 0.4s; }
        .the-key:hover { transform: rotate(90deg); opacity: 1; }
        .key-menu {
            position: fixed; bottom: 90px; right: 30px; z-index: 1099;
            background: rgba(10,15,24,0.98); border: 1px solid var(--gold-mid);
            padding: 20px; border-radius: 4px; visibility: hidden; opacity: 0; transition: 0.3s;
        }
        .key-menu.active { visibility: visible; opacity: 1; }
        .key-menu a { display: block; color: #ddd; text-decoration: none; padding: 10px 0; font-size: 0.9rem; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .giscus-container { margin-top: 60px; padding: 30px; background: rgba(255,255,255,0.02); border-radius: 8px; border: 1px solid rgba(212,184,150,0.1); }
        .cursor { display: inline-block; width: 2px; height: 1.1em; background: var(--burgundy); animation: blink 1s infinite; vertical-align: middle; }
        .hidden { display: none; }
        @keyframes blink { 50% { opacity: 0; } }

        @media (max-width: 600px) {
            .pattern-container { margin-top: 80px; padding: 15px; }
            .pattern-content { padding: 40px 20px; }
            .brass-ring { width: 8px; height: 50px; }
            .spiral-binding { padding: 0 20px; top: -20px; }
        }
    </style>
</head>
<body>
    <div class="vignette-overlay"></div>

    <a href="index.html" class="exit-door">
        <div class="door-icon"></div>
        <span class="exit-text">To Study Wing</span>
    </a>
    <div class="today-marker" onclick="renderPattern(getTodayIndex())">Today</div>

    <main class="pattern-container">
        <div class="calendar-base">
            <div class="spiral-binding">
                <div class="brass-ring"></div><div class="brass-ring"></div>
                <div class="brass-ring"></div><div class="brass-ring"></div>
                <div class="brass-ring"></div><div class="brass-ring"></div>
            </div>

            <div class="calendar-page" id="calendarPage">
                <div class="page-header-strip">
                    <div class="header-num" id="patternNumber">093</div>
                    <div class="header-meta">
                        <span id="yearNumDisplay">2026</span>
                        <b id="yearNameDisplay">YEAR OF THE READER</b>
                    </div>
                </div>

                <div class="pattern-content">
                    <h2 class="pattern-title">
                        <span id="titleText"></span><span class="cursor" id="cursor"></span>
                    </h2>
                    <div class="pattern-body" id="patternBody"></div>
                    
                    <div class="deeper-layer">
                        <span class="deeper-label">Deeper Layer</span>
                        <span class="deeper-text" id="deeperText"></span>
                    </div>

                    <div class="substack-connection" id="substackSection">
                        <a href="#" class="substack-link" id="substackBtn" target="_blank">Continue on Substack</a>
                    </div>
                </div>

                <div class="page-curl">
                    <div class="curl-shadow"></div>
                    <div class="curl-fold"></div>
                </div>
            </div>
        </div>

        <div class="pattern-nav">
            <button class="nav-btn" onclick="navigatePattern(-1)">←</button>
            <button class="nav-btn" onclick="navigatePattern(1)">→</button>
        </div>

        <div class="archive-section">
            <div class="year-grid">
                <div class="year-item active" onclick="renderPattern(0)"><b>2026</b><span>Year of the Reader</span></div>
                <div class="year-item" onclick="renderPattern(365)"><b>2027</b><span>Year of the Writer</span></div>
            </div>
        </div>

        <div class="giscus-container">
            <div id="giscus"></div>
        </div>
    </main>

    <div class="the-key" id="theKey">
        <svg width="40" height="40" viewBox="0 0 50 50" fill="none" stroke="#C2A45F" stroke-width="1.5">
            <circle cx="20" cy="20" r="7"/><path d="M26 26 L42 42 M42 42 L35 42 M42 42 L42 35"/><rect x="17" y="28" width="6" height="12" rx="1"/>
        </svg>
    </div>
    <div class="key-menu" id="keyMenu">
        <h3>The Palace</h3>
        <a href="index.html">The Lobby</a>
        <a href="reading-room.html">Reading Room</a>
        <a href="pattern-thoughts.html">Pattern Thoughts</a>
    </div>

    <script>
        // FULL DATA OBJECT RESTORED
        const patternThoughts = [
            {
                number: "001",
                title: "The silence between words is where meaning lives.",
                body: "We fill our days with noise—notifications, opinions, the endless scroll. But meaning doesn't arrive announced. It slips in during the pause.",
                deeper: "The quietest people often have the loudest minds.",
                substackUrl: "https://substack.com/@metavoxa"
            },
            // ... (Your loop will generate the rest below)
        ];

        for (let i = 2; i <= 365; i++) {
            patternThoughts.push({
                number: i.toString().padStart(3, '0'),
                title: `Pattern Thought ${i.toString().padStart(3, '0')}`,
                body: "This pattern thought is unfolding. Each day brings a new compression of intelligence—a thought that stands alone.",
                deeper: "The deeper layer reveals itself to those who sit with the question.",
                substackUrl: ""
            });
        }

        let currentIndex = 0;
        let isTyping = false;

        function getTodayIndex() {
            const start = new Date(2026, 0, 1);
            const diff = new Date() - start;
            return Math.max(0, Math.min(Math.floor(diff / 86400000), 364));
        }

        async function typeText(el, text) {
            isTyping = true;
            el.textContent = "";
            document.getElementById('cursor').classList.remove('hidden');
            for (let char of text) {
                el.textContent += char;
                await new Promise(r => setTimeout(r, 40));
            }
            document.getElementById('cursor').classList.add('hidden');
            isTyping = false;
        }

        async function renderPattern(index) {
            if (isTyping) return;
            currentIndex = index;
            const p = patternThoughts[index];
            
            // Flip effect
            const page = document.getElementById('calendarPage');
            page.style.transform = "rotateX(-15deg) translateY(-20px)";
            page.style.opacity = "0";

            setTimeout(async () => {
                document.getElementById('patternNumber').textContent = p.number;
                document.getElementById('patternBody').textContent = p.body;
                document.getElementById('deeperText').textContent = p.deeper;
                
                const sub = document.getElementById('substackSection');
                if(p.substackUrl) {
                    document.getElementById('substackBtn').href = p.substackUrl;
                    sub.classList.add('visible');
                } else {
                    sub.classList.remove('visible');
                }

                page.style.transform = "rotateX(0) translateY(0)";
                page.style.opacity = "1";

                await typeText(document.getElementById('titleText'), p.title);
            }, 300);
        }

        // The Key Toggle
        document.getElementById('theKey').onclick = (e) => {
            e.stopPropagation();
            document.getElementById('keyMenu').classList.toggle('active');
        };
        document.onclick = () => document.getElementById('keyMenu').classList.remove('active');

        function navigatePattern(dir) {
            let next = currentIndex + dir;
            if (next >= 0 && next < patternThoughts.length) renderPattern(next);
        }

        // Init
        renderPattern(getTodayIndex());
    </script>
</body>
</html>
