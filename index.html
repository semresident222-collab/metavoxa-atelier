<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaVoxa | The Atrium</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            height: 100vh;
            font-family: 'Cormorant Garamond', serif;
        }

        #void {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            animation: emergence 4s ease-out forwards;
            animation-delay: 0.5s;
        }

        @keyframes emergence {
            0% { opacity: 1; }
            100% { opacity: 0; pointer-events: none; }
        }

        #atrium {
            position: relative;
            width: 100%;
            height: 100%;
            opacity: 0;
            animation: fade-in 3s ease-out forwards;
            animation-delay: 1s;
        }

        @keyframes fade-in {
            to { opacity: 1; }
        }

        /* The photograph */
        #base-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.9) contrast(1.1);
        }

        /* Canvas overlay for effects */
        #effects-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            mix-blend-mode: screen;
        }

        /* Interactive zones */
        .zone {
            position: absolute;
            z-index: 10;
            cursor: pointer;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Study Wing - Left arch */
        .zone-study {
            left: 15%;
            top: 25%;
            width: 25%;
            height: 50%;
        }

        /* Observatory - Right arch */
        .zone-observatory {
            right: 12%;
            top: 25%;
            width: 28%;
            height: 50%;
        }

        /* Glam Wing - Front left map */
        .zone-glam {
            left: 3%;
            bottom: 12%;
            width: 20%;
            height: 40%;
        }

        /* Salon - Front right curtain */
        .zone-salon {
            right: 0%;
            bottom: 8%;
            width: 22%;
            height: 55%;
        }

        /* Zone glow overlays */
        .zone::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease;
            pointer-events: none;
        }

        .zone-study::before {
            background: radial-gradient(ellipse at 40% 60%, 
                rgba(255,160,60,0.4) 0%, 
                rgba(255,140,40,0.2) 30%,
                transparent 60%);
            filter: blur(20px);
        }

        .zone-observatory::before {
            background: radial-gradient(ellipse at 60% 50%, 
                rgba(100,180,255,0.35) 0%, 
                rgba(80,160,240,0.15) 40%,
                transparent 70%);
            filter: blur(25px);
        }

        .zone-glam::before {
            background: radial-gradient(ellipse at 30% 70%, 
                rgba(255,200,100,0.4) 0%, 
                rgba(255,180,80,0.2) 40%,
                transparent 60%);
            filter: blur(15px);
        }

        .zone-salon::before {
            background: radial-gradient(ellipse at 70% 40%, 
                rgba(255,160,80,0.35) 0%, 
                rgba(200,120,60,0.15) 50%,
                transparent 70%);
            filter: blur(30px);
        }

        .zone:hover::before {
            opacity: 1;
        }

        /* Floating candles container */
        #candles-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 6;
        }

        .candle {
            position: absolute;
            width: 8px;
            height: 24px;
            background: linear-gradient(to bottom, #f5f5dc 0%, #e8e4c9 100%);
            border-radius: 2px;
            opacity: 0.6;
            transition: all 0.6s ease;
        }

        .candle::before {
            content: '';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 12px;
            background: radial-gradient(ellipse at center, 
                rgba(255,200,100,0.9) 0%, 
                rgba(255,100,50,0.6) 40%,
                transparent 70%);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            opacity: 0;
            transition: opacity 0.8s ease;
            filter: blur(2px);
            animation: flame-flicker 0.1s infinite alternate;
        }

        .candle.lit::before {
            opacity: 1;
        }

        @keyframes flame-flicker {
            0% { transform: translateX(-50%) scale(1) rotate(-2deg); }
            100% { transform: translateX(-50%) scale(1.1) rotate(2deg); }
        }

        .candle::after {
            content: '';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, 
                rgba(255,160,60,0.3) 0%, 
                transparent 70%);
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: none;
        }

        .candle.lit::after {
            opacity: 1;
            animation: glow-pulse 2s ease-in-out infinite;
        }

        @keyframes glow-pulse {
            0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.3; }
            50% { transform: translateX(-50%) scale(1.3); opacity: 0.5; }
        }

        /* Zone text */
        .zone-text {
            position: absolute;
            text-align: center;
            pointer-events: none;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            width: 280px;
            left: 50%;
            top: 50%;
            margin-left: -140px;
            margin-top: -40px;
            z-index: 20;
        }

        .zone:hover .zone-text {
            opacity: 1;
            transform: translateY(0);
        }

        .zone-poetic {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-style: italic;
            color: rgba(255,255,240,0.95);
            letter-spacing: 0.12em;
            margin-bottom: 0.8rem;
            text-shadow: 0 2px 20px rgba(0,0,0,0.9);
            opacity: 0;
            animation: text-reveal 0.6s ease 0.2s forwards;
        }

        .zone-name {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: #fff8e7;
            text-shadow: 0 2px 30px rgba(0,0,0,1), 0 0 40px rgba(255,255,255,0.1);
            opacity: 0;
            animation: text-reveal 0.6s ease 0.5s forwards;
        }

        @keyframes text-reveal {
            to { opacity: 1; }
        }

        /* Map levitation effect */
        .zone-glam .levitation-indicator {
            position: absolute;
            left: 25%;
            top: 45%;
            width: 50%;
            height: 30%;
            background: radial-gradient(ellipse at center, 
                rgba(255,200,100,0.2) 0%, 
                transparent 70%);
            opacity: 0;
            transition: all 0.8s ease;
            transform: translateY(0);
            filter: blur(10px);
        }

        .zone-glam:hover .levitation-indicator {
            opacity: 1;
            transform: translateY(-15px);
        }

        /* Curtain breathing effect */
        .zone-salon .curtain-breath {
            position: absolute;
            right: 0;
            top: 10%;
            width: 60%;
            height: 80%;
            background: linear-gradient(to left, 
                rgba(139,69,19,0.3) 0%, 
                transparent 100%);
            opacity: 0;
            transition: all 1.2s ease;
            transform: scaleX(1);
            filter: blur(8px);
        }

        .zone-salon:hover .curtain-breath {
            opacity: 1;
            transform: scaleX(1.15);
        }

        /* Center guidance */
        #guidance {
            position: absolute;
            bottom: 6%;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem;
            font-style: italic;
            color: rgba(245,245,220,0.5);
            letter-spacing: 0.25em;
            text-shadow: 0 2px 20px rgba(0,0,0,0.8);
            opacity: 0;
            z-index: 15;
            pointer-events: none;
            transition: opacity 3s ease;
        }

        #guidance.visible {
            opacity: 0.6;
            animation: breathe 5s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.7; }
        }

        /* Transition */
        #transition {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.5s ease;
        }

        #transition.active {
            opacity: 1;
            pointer-events: all;
        }

        /* Parallax container */
        #parallax-container {
            position: absolute;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            transition: transform 0.3s ease-out;
        }

        /* Neural displacement overlay */
        #neural-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 4;
            opacity: 0.4;
            mix-blend-mode: overlay;
            background: 
                radial-gradient(circle at 30% 40%, rgba(200,200,220,0.1) 0%, transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(220,210,200,0.1) 0%, transparent 50%);
            filter: blur(40px);
            animation: neural-drift 20s ease-in-out infinite;
        }

        @keyframes neural-drift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(2%, -1%) scale(1.02); }
            66% { transform: translate(-1%, 2%) scale(0.98); }
        }

        @media (max-width: 768px) {
            .zone-text { transform: scale(0.85); width: 240px; margin-left: -120px; }
            .zone-poetic { font-size: 0.95rem; }
            .zone-name { font-size: 1rem; letter-spacing: 0.2em; }
            #guidance { font-size: 1rem; bottom: 4%; }
            #center-glow { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div id="void"></div>
    <div id="transition"></div>

    <div id="atrium">
        <div id="parallax-container">
            <img id="base-image" src="IMG_7289.jpg" alt="The Atrium">
        </div>
        
        <div id="neural-overlay"></div>
        <canvas id="effects-canvas"></canvas>
        <div id="candles-container"></div>

        <!-- Study Wing -->
        <div class="zone zone-study" data-target="study-wing.html">
            <div class="zone-text">
                <div class="zone-poetic">Where patterns become visible</div>
                <div class="zone-name">Study Wing</div>
            </div>
        </div>

        <!-- Observatory -->
        <div class="zone zone-observatory" data-target="observatory.html">
            <div class="zone-text">
                <div class="zone-poetic">Where distance creates clarity</div>
                <div class="zone-name">Observatory</div>
            </div>
        </div>

        <!-- Glam Wing -->
        <div class="zone zone-glam" data-target="glam-wing.html">
            <div class="levitation-indicator"></div>
            <div class="zone-text">
                <div class="zone-poetic">Where dressing is a discipline</div>
                <div class="zone-name">Glam Wing</div>
            </div>
        </div>

        <!-- Salon -->
        <div class="zone zone-salon" data-target="salon.html">
            <div class="curtain-breath"></div>
            <div class="zone-text">
                <div class="zone-poetic">Where the coven gathers</div>
                <div class="zone-name">Salon</div>
            </div>
        </div>

        <div id="guidance">Begin where you are pulled.</div>
    </div>

    <script>
        // Create floating candles
        const candlesContainer = document.getElementById('candles-container');
        const candles = [];
        const numCandles = 5;

        for (let i = 0; i < numCandles; i++) {
            const candle = document.createElement('div');
            candle.className = 'candle';
            
            // Position in study wing area with variation
            const baseX = 18 + Math.random() * 12;
            const baseY = 35 + Math.random() * 25;
            
            candle.style.left = baseX + '%';
            candle.style.top = baseY + '%';
            candle.style.animationDelay = Math.random() * 5 + 's';
            
            candlesContainer.appendChild(candle);
            
            candles.push({
                element: candle,
                baseX: baseX,
                baseY: baseY,
                phase: Math.random() * Math.PI * 2,
                speed: 0.0003 + Math.random() * 0.0002,
                floatRange: 8 + Math.random() * 6
            });
        }

        // Animate candles floating
        let time = 0;
        function animateCandles() {
            time += 1;
            candles.forEach(candle => {
                const floatY = Math.sin(time * candle.speed + candle.phase) * candle.floatRange;
                const driftX = Math.cos(time * candle.speed * 0.7 + candle.phase) * 3;
                
                candle.element.style.transform = `translate(${driftX}px, ${floatY}px)`;
            });
            requestAnimationFrame(animateCandles);
        }
        animateCandles();

        // Canvas effects for particles and light beams
        const canvas = document.getElementById('effects-canvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Dust particles
        const particles = [];
        for (let i = 0; i < 50; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3,
                size: Math.random() * 2,
                alpha: Math.random() * 0.5
            });
        }

        // Light beams
        const beams = [];
        for (let i = 0; i < 3; i++) {
            beams.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height * 0.5,
                width: 50 + Math.random() * 100,
                angle: Math.random() * Math.PI,
                speed: 0.001 + Math.random() * 0.002,
                phase: Math.random() * Math.PI * 2
            });
        }

        let frameCount = 0;
        function drawEffects() {
            frameCount++;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw dust
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(220, 210, 200, ${p.alpha * 0.3})`;
                ctx.fill();
            });
            
            // Draw subtle light beams
            beams.forEach(beam => {
                const opacity = 0.03 + Math.sin(frameCount * beam.speed + beam.phase) * 0.02;
                const gradient = ctx.createLinearGradient(
                    beam.x, beam.y,
                    beam.x + Math.cos(beam.angle) * 200,
                    beam.y + Math.sin(beam.angle) * 200
                );
                gradient.addColorStop(0, `rgba(200, 200, 220, ${opacity})`);
                gradient.addColorStop(0.5, `rgba(220, 210, 200, ${opacity * 0.5})`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.moveTo(beam.x, beam.y);
                ctx.lineTo(
                    beam.x + Math.cos(beam.angle + 0.1) * 300,
                    beam.y + Math.sin(beam.angle + 0.1) * 300
                );
                ctx.lineTo(
                    beam.x + Math.cos(beam.angle - 0.1) * 300,
                    beam.y + Math.sin(beam.angle - 0.1) * 300
                );
                ctx.closePath();
                ctx.fillStyle = gradient;
                ctx.fill();
            });
            
            requestAnimationFrame(drawEffects);
        }
        drawEffects();

        // Zone interactions
        const zones = document.querySelectorAll('.zone');
        const studyZone = document.querySelector('.zone-study');
        
        zones.forEach(zone => {
            zone.addEventListener('mouseenter', function() {
                const target = this.getAttribute('data-target');
                
                // Light candles if study wing
                if (this.classList.contains('zone-study')) {
                    candles.forEach(c => c.element.classList.add('lit'));
                }
            });
            
            zone.addEventListener('mouseleave', function() {
                // Extinguish candles
                if (this.classList.contains('zone-study')) {
                    candles.forEach(c => c.element.classList.remove('lit'));
                }
            });
            
            zone.addEventListener('click', function() {
                const target = this.getAttribute('data-target');
                document.getElementById('transition').classList.add('active');
                setTimeout(() => {
                    window.location.href = target;
                }, 1500);
            });
        });

        // Parallax effect
        const parallaxContainer = document.getElementById('parallax-container');
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            
            parallaxContainer.style.transform = `translate(${-x}px, ${-y}px)`;
        });

        // Guidance timer
        setTimeout(() => {
            document.getElementById('guidance').classList.add('visible');
        }, 8000);
    </script>

</body>
</html>
