<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MetaVoxa | The Atrium</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a0f;
            font-family: 'Crimson Text', Georgia, serif;
        }

        #atrium-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* === BACKGROUND IMAGE === */
        #atrium-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('atrium-photo.jpg');
            background-position: center center;
            background-repeat: no-repeat;
            background-size: cover;
            z-index: 1;
        }

        /* === FLOATING CANDLES === */
        .candle {
            position: absolute;
            width: 8px;
            height: 24px;
            background: linear-gradient(to top, #8B4513 0%, #D2691E 40%, #FFD700 70%, #FFF8DC 100%);
            border-radius: 4px 4px 2px 2px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4), 0 0 40px rgba(255, 165, 0, 0.2);
            animation: float 6s ease-in-out infinite;
            z-index: 2;
        }

        .candle::before {
            content: '';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 8px;
            background: radial-gradient(ellipse at center, #FFF 0%, #FFD700 50%, transparent 100%);
            border-radius: 50%;
            animation: flicker 2s ease-in-out infinite alternate;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        @keyframes flicker {
            0% { opacity: 0.8; transform: translateX(-50%) scale(1); }
            100% { opacity: 1; transform: translateX(-50%) scale(1.1); }
        }

        /* === DUST PARTICLES === */
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(232, 220, 200, 0.6);
            border-radius: 50%;
            animation: drift 10s linear infinite;
            z-index: 2;
        }

        @keyframes drift {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) translateX(20px); opacity: 0; }
        }

        /* === TEXT CONTENT === */
        #atrium-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 600px;
            text-align: center;
            color: #e8dcc8;
            z-index: 3;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #atrium-content h1 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 600;
            margin: 0 0 20px 0;
            line-height: 1.3;
            text-shadow: 0 2px 15px rgba(0,0,0,0.9), 0 0 30px rgba(0,0,0,0.5);
            letter-spacing: 0.02em;
        }

        #atrium-content .subtitle {
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            font-style: italic;
            line-height: 1.6;
            margin: 0 0 15px 0;
            text-shadow: 0 1px 8px rgba(0,0,0,0.9);
            opacity: 0.9;
        }

        #atrium-content .body-text {
            font-size: clamp(0.85rem, 2vw, 1rem);
            line-height: 1.7;
            margin: 0;
            text-shadow: 0 1px 6px rgba(0,0,0,0.9);
            opacity: 0.85;
        }

        /* === INTRO SEQUENCE === */
        #intro-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 10;
            animation: introFade 5s ease-out forwards;
            pointer-events: none;
        }

        @keyframes introFade {
            0% { opacity: 1; }
            30% { opacity: 0.8; }
            60% { opacity: 0.4; }
            100% { opacity: 0; }
        }

        /* === GO BACK BUTTON === */
        #back-to-lobby {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 4;
            padding: 12px 28px;
            background: rgba(10, 10, 15, 0.6);
            border: 1px solid rgba(232, 220, 200, 0.25);
            color: #e8dcc8;
            font-family: inherit;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            cursor: pointer;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            transition: all 0.4s ease;
            text-decoration: none;
            display: inline-block;
        }

        #back-to-lobby:hover {
            background: rgba(232, 220, 200, 0.08);
            border-color: rgba(232, 220, 200, 0.5);
            letter-spacing: 0.08em;
        }

        /* ============================================
           MOBILE FIXES
           ============================================ */
        @media (max-width: 768px) {
            #atrium-bg {
                /* Show full image on mobile */
                background-size: contain;
                background-position: center center;
                background-color: #0a0a0f;
            }

            #atrium-content {
                width: 90%;
                padding: 15px;
                /* Lower position so text doesn't overlap image focal point */
                top: 58%;
            }

            #atrium-content h1 {
                font-size: 1.3rem;
                margin-bottom: 15px;
            }

            #atrium-content .subtitle {
                font-size: 0.85rem;
            }

            #atrium-content .body-text {
                font-size: 0.8rem;
                line-height: 1.6;
            }

            #back-to-lobby {
                bottom: 20px;
                padding: 10px 22px;
                font-size: 0.75rem;
            }

            /* Reduce candle intensity on small screens */
            .candle {
                opacity: 0.7;
            }
        }

        @media (max-width: 480px) {
            #atrium-content {
                width: 92%;
                top: 62%;
            }

            #atrium-content h1 {
                font-size: 1.15rem;
            }

            #atrium-content .subtitle {
                font-size: 0.8rem;
            }

            #atrium-content .body-text {
                font-size: 0.75rem;
            }
        }

        /* Landscape phones */
        @media (max-height: 500px) and (orientation: landscape) {
            #atrium-content {
                top: 50%;
            }

            #atrium-content h1 {
                font-size: 1.2rem;
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div id="atrium-container">
        <!-- Intro fade from dark -->
        <div id="intro-overlay"></div>

        <!-- Background -->
        <div id="atrium-bg"></div>

        <!-- Floating candles (generated by JS) -->
        <div id="candles-layer"></div>

        <!-- Dust particles (generated by JS) -->
        <div id="particles-layer"></div>

        <!-- Content -->
        <div id="atrium-content">
            <h1>The Atrium</h1>
            <p class="subtitle">A calm, sacred digital environment</p>
            <p class="body-text">
                Where thought breathes before it becomes word.
                Light your candle. The house is open.
            </p>
        </div>

        <!-- Navigation -->
        <a href="index.html" id="back-to-lobby">← Return to Lobby</a>
    </div>

    <script>
        // Generate floating candles
        const candlesLayer = document.getElementById('candles-layer');
        const candleCount = window.innerWidth < 768 ? 5 : 12;

        for (let i = 0; i < candleCount; i++) {
            const candle = document.createElement('div');
            candle.className = 'candle';
            candle.style.left = Math.random() * 100 + '%';
            candle.style.top = (30 + Math.random() * 50) + '%';
            candle.style.animationDelay = Math.random() * 6 + 's';
            candle.style.animationDuration = (5 + Math.random() * 4) + 's';
            candlesLayer.appendChild(candle);
        }

        // Generate dust particles
        const particlesLayer = document.getElementById('particles-layer');
        const particleCount = window.innerWidth < 768 ? 8 : 20;

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 10 + 's';
            particle.style.animationDuration = (8 + Math.random() * 6) + 's';
            particlesLayer.appendChild(particle);
        }
    </script>
</body>
</html>
