<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaVoxa | The Atrium</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030303;
            --transition-speed: 1.2s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            font-family: 'Playfair Display', serif;
            color: #fff;
            overflow: hidden;
        }

        /* The Main Scene */
        #atrium-scene {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: url('atrium.jpg') no-repeat center center;
            background-size: cover;
            opacity: 0; /* Starts in darkness */
            transition: opacity 5s ease-in-out, transform 8s ease-out;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Neural Light Overlay */
        #neuralCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            mix-blend-mode: screen;
        }

        /* Central Logo/Mark */
        .floor-mark {
            position: absolute;
            bottom: 22%; /* Positioned over the floor glow in your photo */
            text-align: center;
            z-index: 5;
            pointer-events: none;
        }

        .metavoxa-text {
            font-size: 3.5rem;
            letter-spacing: 0.8rem;
            font-weight: 400;
            opacity: 0.6;
            color: #e0e0e0;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.4);
            filter: blur(1px);
        }

        .initial-instruction {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-style: italic;
            font-size: 1.2rem;
            letter-spacing: 0.1rem;
            color: rgba(255,255,255,0.4);
            opacity: 0;
            z-index: 100;
            pointer-events: none;
            transition: opacity 2s ease;
        }

        /* Interactive Zones (Hotspots) */
        .zone {
            position: absolute;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 1s ease;
        }

        /* Hotspot Mapping based on your photo */
        .study { left: 22%; top: 48%; width: 18%; height: 30%; }
        .observatory { right: 22%; top: 52%; width: 15%; height: 25%; }
        .salon { right: 5%; bottom: 15%; width: 15%; height: 60%; }
        .glam { left: 5%; bottom: 15%; width: 20%; height: 40%; }

        /* Label styling */
        .zone-label {
            opacity: 0;
            text-align: center;
            transition: opacity 0.8s ease;
            pointer-events: none;
            text-shadow: 0 0 15px rgba(0,0,0,0.9);
        }

        .poetic-line { 
            font-style: italic; 
            font-size: 1rem; 
            color: rgba(255,255,255,0.8);
            margin-bottom: 8px;
        }

        .wing-title { 
            font-size: 1.3rem; 
            letter-spacing: 0.3rem; 
            text-transform: uppercase;
            font-weight: 300;
        }

        /* Hover Interactions */
        .zone:hover { cursor: pointer; }
        .zone:hover .zone-label { opacity: 1; }

        /* Custom Soft Cursor */
        #cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease-out, width 0.3s, height 0.3s;
            backdrop-filter: blur(2px);
        }

        /* Transition to next page */
        .fade-out {
            opacity: 0 !important;
            transform: scale(1.1) !important;
            transition: opacity 2s ease, transform 3s ease !important;
        }

    </style>
</head>
<body>

    <div id="cursor"></div>
    <div class="initial-instruction" id="intro-text">Begin where you are pulled.</div>

    <main id="atrium-scene">
        <canvas id="neuralCanvas"></canvas>

        <div class="floor-mark">
            <h1 class="metavoxa-text">MetaVoxa</h1>
        </div>

        <div class="zone study" onclick="navigateTo('study-wing.html')">
            <div class="zone-label">
                <div class="poetic-line">“Where patterns become visible”</div>
                <div class="wing-title">Study Wing</div>
            </div>
        </div>

        <div class="zone observatory" onclick="navigateTo('observatory.html')">
            <div class="zone-label">
                <div class="poetic-line">“Where distance creates clarity”</div>
                <div class="wing-title">Observatory</div>
            </div>
        </div>

        <div class="zone salon" onclick="navigateTo('salon.html')">
            <div class="zone-label">
                <div class="poetic-line">“Where the coven gathers”</div>
                <div class="wing-title">Salon</div>
            </div>
        </div>

        <div class="zone glam" onclick="navigateTo('glam-wing.html')">
            <div class="zone-label">
                <div class="poetic-line">“Where dressing is a discipline”</div>
                <div class="wing-title">Glam Wing</div>
            </div>
        </div>
    </main>

    <script>
        const scene = document.getElementById('atrium-scene');
        const intro = document.getElementById('intro-text');
        const cursor = document.getElementById('cursor');

        // 1. Scene Entrance (Fade from Black)
        window.onload = () => {
            setTimeout(() => {
                scene.style.opacity = "1";
            }, 1000);

            setTimeout(() => {
                intro.style.opacity = "1";
                setTimeout(() => { intro.style.opacity = "0"; }, 4000);
            }, 3500);
        };

        // 2. Cursor movement
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // 3. Neural Current Simulation (Faint lines)
        const canvas = document.getElementById('neuralCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class NeuralPulse {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.2 - 0.1;
                this.opacity = Math.random() * 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if(this.x > canvas.width) this.x = 0;
                if(this.opacity < 0.1) this.opacity += 0.01;
            }
            draw() {
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + 40, this.y + (Math.sin(this.x/50)*5));
                ctx.strokeStyle = `rgba(200, 220, 255, ${this.opacity * 0.2})`;
                ctx.stroke();
            }
        }

        for (let i = 0; i < 30; i++) particles.push(new NeuralPulse());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        animate();

        // 4. Navigation Transition
        function navigateTo(url) {
            scene.classList.add('fade-out');
            setTimeout(() => {
                window.location.href = url;
            }, 2000);
        }

        // 5. Hover Feedback for Cursor
        document.querySelectorAll('.zone').forEach(z => {
            z.addEventListener('mouseenter', () => {
                cursor.style.width = '60px';
                cursor.style.height = '60px';
                cursor.style.background = 'rgba(255,255,255,0.1)';
            });
            z.addEventListener('mouseleave', () => {
                cursor.style.width = '20px';
                cursor.style.height = '20px';
                cursor.style.background = 'rgba(255,255,255,0.3)';
            });
        });

    </script>
</body>
</html>
